<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 포트폴리오</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --cream: #f4f0e8;
      --ink: #1a1a18;
      --ink-light: #5a574f;
      --accent: #c8371a;
      --accent2: #3b4f8c;
      --card-border: rgba(26,26,24,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Pretendard', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 56px 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid var(--card-border);
    }

    .header-title {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title .name-id {
      font-weight: 300;
      font-size: 0.55em;
      color: var(--ink-light);
      letter-spacing: 0.04em;
    }

    .header-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1.5px solid var(--accent);
      padding-bottom: 1px;
      transition: color 0.2s;
    }

    .header-title a:hover { color: var(--accent); }

    .accent-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      margin-bottom: 3px;
      flex-shrink: 0;
    }

    .header-subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--ink-light);
      margin-top: 2px;
    }

    .header-subtitle a {
      color: var(--accent2);
      text-decoration: none;
      border-bottom: 1px solid rgba(59,79,140,0.3);
    }

    .header-subtitle a:hover { color: var(--accent2); border-color: var(--accent2); }

    .label-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .col-label {
      padding: 14px 0 6px;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .col-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    #projects {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px 64px;
      gap: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--card-border);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      box-shadow: 0 2px 12px rgba(26,26,24,0.05);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(26,26,24,0.12);
      transform: translateY(-3px);
    }

    .card-header {
      padding: 10px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
    }

    .card-num {
      font-size: 0.72rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-light);
    }

    .card-tag {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .tag-static {
      background: rgba(59, 79, 140, 0.1);
      color: var(--accent2);
      border: 1px solid rgba(59,79,140,0.2);
    }

    .tag-dynamic {
      background: rgba(200, 55, 26, 0.1);
      color: var(--accent);
      border: 1px solid rgba(200,55,26,0.2);
    }

    .cell {
      position: relative;
      overflow: hidden;
      background: var(--cream);
    }

    .cell iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }

    .card-footer {
      padding: 8px 14px 10px;
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--ink);
    }

    .card-open {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .card-open:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--card-border);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink-light);
    }

    @media (max-width: 640px) {
      header { padding: 40px 24px 28px; }
      #projects { padding: 0 16px 48px; gap: 12px; }
      .label-row { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="header-title">
      <span class="name-id">20253307 이승빈</span>
      <a href="https://github.com/lsb1022/p5js-visual-portfolio" target="_blank">p5js visual portfolio</a>
      <span class="accent-dot"></span>
    </h1>
    <p class="header-subtitle">
      숭실대학교
      <a href="https://canvas.ssu.ac.kr/courses/44049" target="_blank">P5.js_비주얼포트폴리오</a>
      강의
    </p>
  </header>

  <div class="label-row">
    <div class="col-label">정적 (Static)</div>
    <div class="col-label">동적 (Dynamic)</div>
  </div>

  <main id="projects">

    <div class="card">
      <div class="card-header">
        <span class="card-num">01</span>
        <span class="card-tag tag-static">Static</span>
      </div>
      <div class="cell" id="c1">
        <iframe src="sample1/index.html" title="과제 1"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">추상화</span>
        <a class="card-open" href="sample1/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-num">04</span>
        <span class="card-tag tag-dynamic">Dynamic</span>
      </div>
      <div class="cell" id="c4">
        <iframe src="sample4/index.html" title="과제 4"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">애니메이션 추상화</span>
        <a class="card-open" href="sample4/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-num">02</span>
        <span class="card-tag tag-static">Static</span>
      </div>
      <div class="cell" id="c2">
        <iframe src="sample2/index.html" title="과제 2"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">캐리커쳐</span>
        <a class="card-open" href="sample2/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-num">03</span>
        <span class="card-tag tag-dynamic">Dynamic</span>
      </div>
      <div class="cell" id="c3">
        <iframe src="sample3/index.html" title="과제 3"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">인터렉션 캐리커쳐</span>
        <a class="card-open" href="sample3/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

  </main>

  <footer>
    <p>p5.js Visual Portfolio &nbsp;·&nbsp; GitHub Pages</p>
  </footer>

  <script>
    function scaleIframes() {
      document.querySelectorAll('.cell').forEach(cell => {
        const iframe = cell.querySelector('iframe');
        if (!iframe) return;
        const w = cell.clientWidth;
        const scale = w / 600;
        iframe.style.transform = `scale(${scale})`;
        cell.style.height = (400 * scale) + 'px';
      });
    }
    scaleIframes();
    window.addEventListener('resize', scaleIframes);
  </script>

</body>
</html>
