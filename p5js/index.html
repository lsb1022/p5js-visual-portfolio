<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 포트폴리오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f4f0e8;
      --ink: #1a1a18;
      --ink-light: #5a574f;
      --accent: #c8371a;
      --accent2: #3b4f8c;
      --teal: #7cc4b6;
      --yellow: #f8c658;
      --card-border: rgba(26,26,24,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 배경 노이즈 텍스처 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── 헤더 ── */
    header {
      position: relative;
      z-index: 1;
      padding: 64px 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid var(--card-border);
    }

    .header-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 1.05;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .header-title span.accent-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 0.8rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* ── 레이블 행 ── */
    .label-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .label-row .col-label {
      padding: 14px 0 6px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label-row .col-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* ── 그리드 ── */
    #projects {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px 64px;
      gap: 20px;
    }

    /* ── 카드 ── */
    .card {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--card-border);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      box-shadow: 0 2px 12px rgba(26,26,24,0.05);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(26,26,24,0.12);
      transform: translateY(-3px);
    }

    .card-header {
      padding: 10px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
    }

    .card-num {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 0.75rem;
      color: var(--ink-light);
    }

    .card-tag {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 400;
    }

    .tag-static {
      background: rgba(59, 79, 140, 0.1);
      color: var(--accent2);
      border: 1px solid rgba(59,79,140,0.2);
    }

    .tag-dynamic {
      background: rgba(200, 55, 26, 0.1);
      color: var(--accent);
      border: 1px solid rgba(200,55,26,0.2);
    }

    /* ── iframe 래퍼 ── */
    .cell {
      aspect-ratio: 3 / 2;
      position: relative;
      overflow: hidden;
      background: var(--cream);
    }

    .cell iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      /* 카드 너비에 맞게 JS로 동적 조정됨 */
      transform: scale(0.5);
      pointer-events: none; /* 썸네일 모드: 클릭 방지 */
    }

    /* ── 카드 푸터 ── */
    .card-footer {
      padding: 8px 14px 10px;
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--ink);
    }

    .card-open {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .card-open:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── 푸터 ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--card-border);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink-light);
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      header { padding: 40px 24px 28px; }
      #projects { padding: 0 16px 48px; gap: 12px; }
      .label-row { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <header>
    <p class="header-eyebrow">Creative Computing · p5.js</p>
    <h1 class="header-title">
      나의 작품 모음
      <span class="accent-dot"></span>
    </h1>
    <p class="header-subtitle">과제 1–4 · 정적 &amp; 동적 시각 예술</p>
  </header>

  <!-- 컬럼 레이블 -->
  <div class="label-row">
    <div class="col-label">정적 (Static)</div>
    <div class="col-label">동적 (Dynamic)</div>
  </div>

  <main id="projects">

    <!-- 행 1: 과제1(정적) | 과제4(동적) -->
    <div class="card">
      <div class="card-header">
        <span class="card-num">01</span>
        <span class="card-tag tag-static">Static</span>
      </div>
      <div class="cell" id="c1">
        <iframe src="sample1/index.html" title="과제 1"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">추상 구성 — Mondrian 계열</span>
        <a class="card-open" href="sample1/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-num">04</span>
        <span class="card-tag tag-dynamic">Dynamic</span>
      </div>
      <div class="cell" id="c4">
        <iframe src="sample4/index.html" title="과제 4"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">추상 심포니 — noise 애니메이션</span>
        <a class="card-open" href="sample4/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <!-- 행 2: 과제2(정적) | 과제3(동적) -->
    <div class="card">
      <div class="card-header">
        <span class="card-num">02</span>
        <span class="card-tag tag-static">Static</span>
      </div>
      <div class="cell" id="c2">
        <iframe src="sample2/index.html" title="과제 2"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">캐리커처 — 기본</span>
        <a class="card-open" href="sample2/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-num">03</span>
        <span class="card-tag tag-dynamic">Dynamic</span>
      </div>
      <div class="cell" id="c3">
        <iframe src="sample3/index.html" title="과제 3"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-title">캐리커처 — Venom 인터랙션</span>
        <a class="card-open" href="sample3/index.html" target="_blank">열기 ↗</a>
      </div>
    </div>

  </main>

  <footer>
    <p>p5.js Visual Portfolio &nbsp;·&nbsp; GitHub Pages</p>
  </footer>

  <script>
    // iframe 스케일을 카드 실제 너비에 맞게 동적 조정
    function scaleIframes() {
      document.querySelectorAll('.cell').forEach(cell => {
        const iframe = cell.querySelector('iframe');
        if (!iframe) return;
        const w = cell.clientWidth;
        const scale = w / 600;
        iframe.style.transform = `scale(${scale})`;
        // 셀 높이를 비율에 맞게 보정
        cell.style.height = (400 * scale) + 'px';
      });
    }
    scaleIframes();
    window.addEventListener('resize', scaleIframes);
  </script>

</body>
</html>
